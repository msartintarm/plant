<svg xmlns="http://www.w3.org/2000/svg" viewBox="-16 8 32 34">
  <!-- Anchor (0,0) = pot rim center, same anchor pot/soil already share.
       A fibrous root mass filling the lower part of the soil column now
       actually visible through pot.svg's hollow outline — drawn on top of
       soil.svg, tinted by Plant::root_health via scene::stem_health_tint,
       so a rotted root system looks visibly unwell right where a player
       would actually look to check it, rather than peeking out from
       underneath the pot where it'd never be seen. -->
  <polygon points="-2,10 -13,22 -11,24 -1,14" fill="#c9b896"/>
  <polygon points="-6,16 -14,30 -12,32 -5,20" fill="#c9b896"/>
  <polygon points="2,10 13,22 11,24 1,14" fill="#c9b896"/>
  <polygon points="6,16 14,30 12,32 5,20" fill="#c9b896"/>
  <polygon points="-1,12 -4,36 -2,37 1,15" fill="#c9b896"/>
  <polygon points="1,15 4,38 6,37 2,14" fill="#c9b896"/>
</svg>
