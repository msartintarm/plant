<svg xmlns="http://www.w3.org/2000/svg" viewBox="-10 -50 20 52">
  <!-- Anchor (0,0) = base (where it attaches to the stem's tip), same
       convention as flower_peace_lily.svg/leaf.svg. Real Dracaena flowers
       are a branched panicle of many small star-shaped, creamy-white
       blossoms (famously fragrant at night) — a wispy spray on a slender
       stalk, not one showy bloom like Peace Lily's spathe. -->
