name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment at a time; don't cancel one that's already running so
# a Pages deploy can't be left half-applied.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            engine/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('engine/Cargo.lock') }}

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
        working-directory: web

      # npm run build triggers wasm:build automatically via the "prebuild"
      # script (see package.json) — no separate wasm step needed here.
      - name: Build static export
        run: npm run build
        working-directory: web
        env:
          # Confirmed against the actual repo (github.com/msartintarm/plant)
          # — served at msartintarm.github.io/plant. See next.config.ts.
          NEXT_PUBLIC_BASE_PATH: /plant

      # GitHub Pages runs Jekyll by default, which ignores _next/ (and
      # anything else underscore-prefixed) — Next's static export puts all
      # its JS/CSS chunks there, so without this the whole site 404s.
      - name: Disable Jekyll processing
        run: touch web/out/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
